
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kivotos Gobang</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Quicksand', sans-serif;
        background-color: #f8fafc; /* Slate 50 */
        overflow: hidden; /* Prevent scrolling during animations */
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      /* Custom Cursors - Blue Archive Millennium Edition */
      /* 最高优先级，使用 html > body 选择器 + !important */
      html body * {
        cursor: url('/cursors/millennium_base.cur') 16 16, auto !important;
      }
      html body a,
      html body button,
      html body [role="button"],
      html body .clickable,
      html body .pointer-events-auto,
      html body .cursor-pointer {
        cursor: url('/cursors/millennium_link.cur') 16 16, pointer !important;
      }
      html body input,
      html body textarea,
      html body [contenteditable="true"] {
        cursor: url('/cursors/millennium_text.cur') 16 16, text !important;
      }
      html body .cursor-move,
      html body [draggable="true"] {
        cursor: url('/cursors/millennium_move.cur') 16 16, move !important;
      }
      html body .cursor-wait,
      html body .loading {
        cursor: url('/cursors/millennium_loading_v1.ani') 16 16, wait !important;
      }
      html body .cursor-not-allowed,
      html body .cursor-disabled,
      html body :disabled {
        cursor: url('/cursors/millennium_block.cur') 16 16, not-allowed !important;
      }
      html body .cursor-ns-resize,
      html body [data-resize="ns"] {
        cursor: url('/cursors/millennium_NS.cur') 16 16, ns-resize !important;
      }
      html body .cursor-ew-resize,
      html body [data-resize="ew"] {
        cursor: url('/cursors/millennium_EW.cur') 16 16, ew-resize !important;
      }
      html body .cursor-crosshair,
      html body .cursor-game {
        cursor: url('/cursors/millennium_areaselect.cur') 16 16, crosshair !important;
      }
      html body .cursor-grab {
        cursor: url('/cursors/millennium_pen.cur') 16 16, grab !important;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "framer-motion": "https://esm.sh/framer-motion@^12.23.26",

    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
</head>

    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
